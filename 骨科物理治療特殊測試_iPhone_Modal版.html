<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨科物理治療特殊測試 - iPhone 穩定版（Modal）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
        }

        .test-card {
            transition: all 0.2s ease;
        }
        
        .test-card:active {
            transform: scale(0.97);
        }

        .modal {
            animation: modalPop 0.2s ease-out forwards;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Header -->
    <header class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-blue-700 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-user-md text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">骨科物理治療特殊測試</h1>
                        <p class="text-blue-600 text-sm">腰椎・骨盆・SIJ + 髖部</p>
                    </div>
                </div>
                
                <button onclick="startQuizMode()" 
                        class="flex items-center gap-x-2 px-4 py-2 bg-emerald-600 text-white rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span class="hidden sm:inline">自測模式</span>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-6 pb-10">
        
        <!-- Search -->
        <div class="mb-6">
            <div class="relative">
                <input type="text" id="searchInput" 
                       class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-3xl text-base focus:outline-none focus:border-blue-400"
                       placeholder="搜尋測試名稱..." onkeyup="filterCards()">
                <i class="fa-solid fa-search absolute left-4 top-4 text-slate-400"></i>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3" id="cardsContainer">
            
            <!-- 所有測試卡片將由 JavaScript 動態產生 -->
            
        </div>

    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-end md:items-center justify-center" onclick="closeModal()">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-white w-full md:w-[520px] md:rounded-3xl md:m-4 rounded-t-3xl max-h-[85vh] overflow-hidden modal">
            
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-5 py-4 border-b">
                <div id="modalTitle" class="font-bold text-xl text-slate-800"></div>
                <button onclick="closeModal()" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-times text-2xl"></i>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="p-5 overflow-y-auto max-h-[70vh]" id="modalContent">
                <!-- 動態內容 -->
            </div>

            <div class="px-5 py-4 border-t bg-slate-50 text-xs text-center text-slate-500">
                點擊卡片即可查看詳細內容
            </div>
        </div>
    </div>

    <script>
        // 所有測試資料
        const tests = [
            {
                id: 1,
                name: "直膝抬腿測試",
                english: "Straight Leg Raise (SLR)",
                category: "腰椎・神經張力",
                purpose: "評估腰椎神經根受壓（L4-S1）或坐骨神經張力。常用於椎間盤突出與坐骨神經痛鑑別。",
                steps: "1. 患者仰臥，檢查者緩慢抬高患側直膝下肢。\n2. 記錄出現放射痛的角度（正常 >70°）。\n3. 可加做踝背屈或頸屈測試。",
                positive: "30°~70° 出現小腿/足部放射痛"
            },
            {
                id: 2,
                name: "駝背測試",
                english: "Slump Test",
                category: "神經張力",
                purpose: "評估硬脊膜與神經根之張力與滑動性，比 SLR 更敏感。",
                steps: "1. 患者坐姿，胸椎後凸 + 頸部屈曲。\n2. 檢查者將患側膝伸直 + 踝背屈。\n3. 觀察是否重現原有放射症狀。",
                positive: "重現原有放射痛，解除頸屈後改善"
            },
            {
                id: 3,
                name: "大腿推力測試",
                english: "Thigh Thrust Test",
                category: "薦髂關節",
                purpose: "評估薦髂關節後方剪力 provocation，最具敏感性的 SIJ 測試之一。",
                steps: "1. 患者仰臥，患側髖屈 90°。\n2. 檢查者沿股骨施加後方向推力。\n3. 另一手穩定對側骨盆。",
                positive: "誘發患側 SIJ 或臀部深層疼痛"
            },
            {
                id: 4,
                name: "Gillet's Test",
                english: "Stork Test",
                category: "薦髂關節",
                purpose: "評估 SIJ 相對移動性（髂骨 vs 薦骨）。",
                steps: "1. 患者站立，檢查者觸診 PSIS 與 S2。\n2. 患者緩慢抬患側腿（髖膝屈曲）。\n3. 觀察 PSIS 相對移動。",
                positive: "PSIS 無明顯移動或過度移動"
            },
            {
                id: 5,
                name: "站立前屈測試",
                english: "Standing Flexion Test",
                category: "薦髂關節",
                purpose: "評估 SIJ 移動性，判斷哪一側活動受限。",
                steps: "1. 患者站立，檢查者觸診雙側 PSIS。\n2. 患者緩慢前屈。\n3. 觀察哪側 PSIS 移動較多/較早。",
                positive: "一側 PSIS 移動明顯較多（該側 hypomobile）"
            },
            {
                id: 6,
                name: "紅鶴測試",
                english: "Flamingo Test",
                category: "骨盆穩定性",
                purpose: "評估骨盆環穩定性與單腿負重時的疼痛。",
                steps: "1. 患者單腿站立（患側）。\n2. 維持平衡或輕微跳躍 30 秒。\n3. 觀察是否誘發骨盆疼痛。",
                positive: "單腿站立誘發 SIJ 或恥骨疼痛"
            },
            {
                id: 7,
                name: "仰臥起坐測試",
                english: "Supine-to-Sit Test",
                category: "骨盆對位",
                purpose: "評估功能性腿長差異與骨盆旋轉（髂骨前/後傾）。",
                steps: "1. 患者仰臥，比較雙側內踝位置。\n2. 患者保持膝伸直坐起。\n3. 再次比較雙側內踝。",
                positive: "仰臥與坐起時腿長變化 → 髂骨旋轉"
            },
            {
                id: 8,
                name: "胡佛測試",
                english: "Hoover Test",
                category: "偽病鑑別",
                purpose: "鑑別器質性 vs 功能性（偽病）下肢無力。",
                steps: "1. 患者仰臥，檢查者手掌置於跟骨下方。\n2. 請患者用力抬一側下肢。\n3. 感覺對側跟骨是否有向下壓力。",
                positive: "患者無法抬腿，但對側無向下壓力"
            },
            {
                id: 9,
                name: "彈壓測試",
                english: "Spring Test",
                category: "腰椎活動度",
                purpose: "評估腰椎節段或薦骨活動度與 end-feel。",
                steps: "1. 患者俯臥。\n2. 檢查者以手掌或拇指對棘突施加 PA 彈壓。\n3. 感受活動度、疼痛與 end-feel。",
                positive: "疼痛、過度活動或明顯受限"
            },
            {
                id: 10,
                name: "托馬斯測試",
                english: "Thomas Test",
                category: "髖部・肌肉長度",
                purpose: "評估髖屈肌群（髂腰肌）與股直肌的柔軟度/長度。",
                steps: "1. 患者仰臥，雙腿伸直。\n2. 患者將一側膝蓋拉向胸前。\n3. 觀察對側大腿是否離開床面及膝關節角度。",
                positive: "對側大腿抬離床面（髂腰肌緊）或膝無法完全屈曲（股直肌緊）"
            },
            {
                id: 11,
                name: "艾利氏測試",
                english: "Ely's Test",
                category: "髖部・肌肉長度",
                purpose: "評估股直肌的柔軟度。",
                steps: "1. 患者俯臥，雙腿伸直。\n2. 檢查者將患側膝關節被動屈曲。\n3. 觀察骨盆是否抬起或跟臀距離。",
                positive: "骨盆抬起或膝無法完全屈曲至跟臀"
            },
            {
                id: 12,
                name: "90-90 直膝抬腿測試",
                english: "90-90 Straight Leg Raise",
                category: "髖部・肌肉長度",
                purpose: "評估膕繩肌（hamstring）的柔軟度與長度。",
                steps: "1. 患者仰臥，髖與膝皆屈曲90°。\n2. 檢查者將小腿被動伸直。\n3. 測量膝關節伸直角度。",
                positive: "膝關節無法完全伸直（正常應可達0°）"
            },
            {
                id: 13,
                name: "歐伯氏測試",
                english: "Ober's Test",
                category: "髖部・髂脛束",
                purpose: "評估髂脛束（ITB）與張肌膜張肌（TFL）的柔軟度。",
                steps: "1. 患者側躺，患側在上。\n2. 髖伸直 + 外展後，讓腿自然下垂。\n3. 觀察大腿是否能貼近床面。",
                positive: "大腿無法貼近床面（髂脛束緊繃）"
            },
            {
                id: 14,
                name: "全碟倫伯格氏徵象",
                english: "Trendelenburg Sign",
                category: "髖部・穩定性",
                purpose: "評估臀中肌力量與髖關節穩定性。",
                steps: "1. 患者單腿站立（患側）。\n2. 觀察對側骨盆是否下降。\n3. 維持 30 秒。",
                positive: "對側骨盆下降（臀中肌無力）"
            },
            {
                id: 15,
                name: "派翠克測試 / FABER",
                english: "Patrick / FABER Test",
                category: "髖關節・SIJ",
                purpose: "鑑別髖關節病變 vs 薦髂關節問題。",
                steps: "1. 患者仰臥，患側踝放在對側膝上。\n2. 檢查者輕壓患側膝蓋向下。\n3. 詢問疼痛位置。",
                positive: "鼠蹊部痛 → 髖關節；臀部痛 → SIJ"
            },
            {
                id: 16,
                name: "磨刷測試",
                english: "Scour Test",
                category: "髖關節",
                purpose: "評估髖關節唇（labrum）或關節內病變。",
                steps: "1. 患者仰臥，髖屈曲。\n2. 檢查者施加軸向壓迫並做圓周運動。\n3. 尋找疼痛或卡住感。",
                positive: "鼠蹊部疼痛、卡住或複製症狀"
            },
            {
                id: 17,
                name: "克雷格測試",
                english: "Craig's Test",
                category: "髖部・股骨前傾角",
                purpose: "評估股骨頸前傾角（femoral anteversion）。",
                steps: "1. 患者俯臥，膝屈90°。\n2. 觸診大轉子最突出處。\n3. 測量脛骨與垂直面之角度。",
                positive: "正常值約 8°~15° 前傾"
            }
        ];

        // 產生卡片
        function renderCards(filteredTests = tests) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            filteredTests.forEach(test => {
                const cardHTML = `
                    <div onclick="showModal(${test.id})" 
                         class="test-card bg-white border border-slate-200 rounded-3xl p-4 shadow-sm active:bg-slate-50 cursor-pointer">
                        <div class="font-bold text-lg text-slate-800 mb-1">${test.name}</div>
                        <div class="text-sm text-slate-500 mb-2">${test.english}</div>
                        <div class="inline-block px-2.5 py-0.5 bg-blue-100 text-blue-700 text-xs rounded-full">${test.category}</div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 顯示 Modal
        function showModal(id) {
            const test = tests.find(t => t.id === id);
            if (!test) return;

            document.getElementById('modalTitle').innerHTML = `
                <div>${test.name}</div>
                <div class="text-sm font-normal text-slate-500">${test.english}</div>
            `;

            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-5">
                    <div>
                        <div class="flex items-center gap-x-2 text-blue-600 font-semibold mb-2">
                            <i class="fa-solid fa-bullseye"></i>
                            <span>測試目的</span>
                        </div>
                        <p class="text-slate-700 leading-relaxed">${test.purpose}</p>
                    </div>
                    
                    <div>
                        <div class="flex items-center gap-x-2 text-blue-600 font-semibold mb-2">
                            <i class="fa-solid fa-list-ol"></i>
                            <span>測試步驟</span>
                        </div>
                        <div class="text-slate-700 leading-relaxed whitespace-pre-line">${test.steps}</div>
                    </div>
                    
                    <div>
                        <div class="flex items-center gap-x-2 text-red-600 font-semibold mb-2">
                            <i class="fa-solid fa-check-circle"></i>
                            <span>陽性發現</span>
                        </div>
                        <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-lg text-red-700">
                            ${test.positive}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // 搜尋功能
        function filterCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tests.filter(test => 
                test.name.toLowerCase().includes(keyword) || 
                test.english.toLowerCase().includes(keyword) ||
                test.category.toLowerCase().includes(keyword)
            );
            renderCards(filtered);
        }

        // 自測模式（簡化版）
        function startQuizMode() {
            alert('自測模式即將推出！\n目前請先使用 Modal 彈窗版學習。');
        }

        // 初始化
        function init() {
            renderCards();
            
            // 讓 Modal 點擊背景可關閉
            const modal = document.getElementById('modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
